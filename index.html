<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmasKu - Treasury Yudi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>EmasKu 2026</h1>
            <p class="subtitle">Pencatatan Mandiri Aset Treasury</p>
        </header>

        <section class="summary">
            <div class="card highlight">
                <span>Total Seluruh Saldo Emas</span>
                <strong id="total-gram-all">0 Gr</strong>
            </div>
            <div class="card">
                <span>Total Modal Investasi</span>
                <strong id="total-idr-all">Rp 0</strong>
            </div>
        </section>

        <section class="form-section">
            <h3 id="form-title">Input Transaksi</h3>
            <input type="hidden" id="edit-id">
            <input type="date" id="input-date">
            <input type="text" id="note" placeholder="Keterangan (Jan, Feb, dll)">
            <input type="number" id="input-idr" placeholder="Nominal IDR">
            <input type="number" step="0.0001" id="input-gram" placeholder="Berat Gram">
            <button class="btn-add" id="btn-save" onclick="saveData()">Simpan Transaksi</button>
            <button class="btn-sec" id="btn-cancel" onclick="resetForm()" style="display:none; margin-top:5px;">Batal Edit</button>
        </section>

        <section class="history">
            <div class="history-header">
                <h3>Riwayat</h3>
                <select id="filter-month" onchange="updateDashboard()">
                    <option value="all">Semua Bulan</option>
                    <option value="0">Januari</option>
                    <option value="1">Februari</option>
                    <option value="2">Maret</option>
                </select>
            </div>
            
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Tgl</th>
                            <th>Keterangan</th>
                            <th>IDR</th>
                            <th>Gram</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                    <tfoot>
                        <tr>
                            <td colspan="2">TOTAL</td>
                            <td id="foot-idr">Rp 0</td>
                            <td id="foot-gram">0.0000</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <p style="font-size: 0.75em; color: #888; margin-top: 10px;">*Klik baris untuk Edit atau Hapus.</p>
        </section>

        <div class="action-footer">
            <button onclick="exportData()" class="btn-sec">Backup</button>
            <input type="file" id="importFile" onchange="importData(event)" style="display:none">
            <button onclick="document.getElementById('importFile').click()" class="btn-sec">Upload</button>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <h3>Detail Transaksi</h3>
            <div id="modal-body"></div>
            <div class="modal-actions">
                <button class="btn-edit" onclick="prepareEdit()">Edit</button>
                <button class="btn-delete" onclick="confirmDelete()">Hapus</button>
                <button class="btn-close" onclick="closeModal()">Tutup</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
