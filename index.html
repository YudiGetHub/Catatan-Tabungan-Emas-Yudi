<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmasKu - Tracker Treasury</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>EmasKu 2026</h1>
            <p class="subtitle">Monitoring Investasi Treasury</p>
        </header>

        <section class="summary">
            <div class="card highlight">
                <span>Total Saldo Emas</span>
                <strong id="total-gram">1.3701 Gr</strong>
            </div>
            <div class="card">
                <span>Total Investasi</span>
                <strong id="total-idr">Rp 0</strong>
            </div>
            <div class="card price-card">
                <span>Harga Emas Hari Ini (API)</span>
                <strong id="live-price">Memuat...</strong>
            </div>
        </section>

        <section class="form-section">
            <h3>Tambah Transaksi Baru / Backdate</h3>
            <label>Tanggal Transaksi:</label>
            <input type="date" id="input-date">
            
            <input type="text" id="note" placeholder="Keterangan (Januari, Februari, dll)">
            <input type="number" id="input-idr" placeholder="Nominal Rupiah (IDR)">
            <input type="number" step="0.0001" id="input-gram" placeholder="Berat Emas (Gram)">
            <button class="btn-add" onclick="addData()">Simpan Transaksi</button>
        </section>

        <section class="history">
            <h3>Riwayat Transaksi (Terurut Tanggal)</h3>
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Ket</th>
                            <th>IDR</th>
                            <th>Gram</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
        
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button onclick="exportData()" style="background:#2c3e50; color:white; flex:1">Backup Data</button>
            <input type="file" id="importFile" onchange="importData(event)" style="display:none">
            <button onclick="document.getElementById('importFile').click()" style="background:#95a5a6; color:white; flex:1">Restore Data</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
